[General]
network = FragmentationNetwork

# Node types configuration
*.host*.typename = "StandardHost"
*.router.typename = "Router"

# Application settings for Host A
*.hostA.numApps = 1
*.hostA.app[0].typename = "UdpBasicApp"
*.hostA.app[0].destAddresses = "hostB"
*.hostA.app[0].destPort = 5000
*.hostA.app[0].messageLength = 1500B
*.hostA.app[0].sendInterval = 1s

# IP Address Configuration (Simplified for this scenario)
*.hostA.ipv4.address = "10.0.0.1"
*.router.ipv4.address = "10.0.0.2"
*.hostB.ipv4.address = "10.0.1.1"

# Fragmentation Configuration: Setting MTU on the router's output interface
# In INET, eth[0] is usually the input from hostA, and eth[1] is the output to hostB
**.router.eth[1].mac.mtu = 500B  # This forces the 1500B packet to split into 3 fragments
